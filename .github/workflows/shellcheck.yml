name: Lint Shell Scripts

on:
  pull_request:
    paths:
      - './RBAC-Secret/**/*.sh'
  push:
    branches:
      - main
    paths:
      - './RBAC-Secret/**/*.sh'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on RBAC-Secret only
        run: |
          shellcheck ./RBAC-Secret/setup.sh
          shellcheck ./RBAC-Secret/verify.sh

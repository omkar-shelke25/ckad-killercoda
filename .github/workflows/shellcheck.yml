
name: Lint Shell Scripts

on:
  pull_request:
    paths:
      - 'RBAC-Secret/**/*.sh'
  push:
    branches:
      - main
    paths:
      - 'RBAC-Secret/**/*.sh'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          additional_files: |
            RBAC-Secret/setup.sh
            RBAC-Secret/verify.sh
